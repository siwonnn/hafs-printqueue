services:
  printqueue:
    build: ./app
    container_name: printqueue
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./app:/app
      - /usr/share/fonts:/usr/share/fonts:ro
    environment:
      - TZ=Asia/Seoul
      - PYTHONUNBUFFERED=1
      - ALLOWED_EMAIL_DOMAIN=hafs.hs.kr
    networks:
      - web

networks:
  web:
    external: true