{% extends "base.html" %}
{% block title %}새 글 작성 · HAFS PrintQueue{% endblock %}

{% block content %}
<section class="welcome">
    <h1>새 글 작성</h1>
    <p class="subtitle">게시판에 글을 남겨보세요</p>
    <div class="welcome-actions">
        <a href="/board" class="btn btn-ghost">← 게시판으로</a>
    </div>
</section>

<div class="board-new-wrap">
    <form method="post" action="/board/new" class="board-new-form" enctype="multipart/form-data">
        <div class="form-group">
            <label for="category">카테고리</label>
            <select id="category" name="category" required onchange="onCategoryChange(this.value)">
                {% if user.role.value == "admin" %}
                <option value="announcement" {% if default_category == 'announcement' %}selected{% endif %}>📢 공지</option>
                {% endif %}
                <option value="question" {% if default_category == 'question' %}selected{% endif %}>❓ 질문</option>
                <option value="free" {% if default_category == 'free' %}selected{% endif %}>💬 자유</option>
            </select>
        </div>

        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required maxlength="300">
        </div>

        <div class="form-group">
            <label for="body">내용</label>
            <textarea id="body" name="body" rows="10" placeholder="내용을 입력하세요" required></textarea>
        </div>

        {% if user.role.value == "admin" %}
        <div class="form-group" id="pin-group" style="display:none;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" name="pinned" id="pinned">
                📌 상단 고정 (공지만 가능)
            </label>
        </div>
        {% endif %}

        <div class="form-group">
            <label for="files">파일 첨부 <span style="color:var(--text-muted);font-size:12px;">(이미지·PDF, 최대 10MB, 여러 개 선택 가능)</span></label>
            <input type="file" id="files" name="files" multiple
                   accept=".jpg,.jpeg,.png,.gif,.webp,.pdf">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">게시하기</button>
            <a href="/board" class="btn btn-ghost">취소</a>
        </div>
    </form>
</div>

<style>
.board-new-wrap { max-width: 720px; }
.board-new-form input[type="text"],
.board-new-form select,
.board-new-form textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    box-sizing: border-box;
}
.board-new-form input[type="text"]:focus,
.board-new-form select:focus,
.board-new-form textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}
.board-new-form textarea { min-height: 200px; resize: vertical; }
.board-new-form input[type="file"] {
    width: 100%;
    padding: 8px 12px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    box-sizing: border-box;
    cursor: pointer;
}
</style>

<script>
function onCategoryChange(val) {
    const pinGroup = document.getElementById('pin-group');
    if (pinGroup) pinGroup.style.display = val === 'announcement' ? 'block' : 'none';
}
onCategoryChange(document.getElementById('category').value);
</script>
{% endblock %}
